name: Release

# Se déclenche quand vous poussez un tag de version (ex. v0.1.0), ou à la main.
on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  build:
    permissions:
      contents: write # nécessaire pour créer la Release et y attacher les binaires
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest # macOS Apple Silicon (arm64)
            args: "--target aarch64-apple-darwin"
            rust-targets: "aarch64-apple-darwin"
          - platform: macos-latest # macOS Intel (x86-64)
            args: "--target x86_64-apple-darwin"
            rust-targets: "x86_64-apple-darwin"
          - platform: ubuntu-22.04 # Linux (.AppImage, .deb, .rpm)
            args: ""
            rust-targets: ""
          - platform: windows-latest # Windows (.msi, .exe)
            args: ""
            rust-targets: ""

    runs-on: ${{ matrix.platform }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust-targets }}

      - name: Cache Rust
        uses: swatinem/rust-cache@v2
        with:
          workspaces: "desktop -> target"

      # Dépendances système de Tauri sur Linux.
      - name: Dépendances Linux
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            build-essential \
            libssl-dev

      # Installe les dépendances du frontend (buildé par beforeBuildCommand de Tauri).
      # `working-directory` plutôt que `npm --prefix` : ce dernier est cassé sous
      # Windows (npm ignore le prefix et cherche package.json à la racine).
      - name: Dépendances frontend
        working-directory: frontend
        run: npm ci

      # Installe la CLI Tauri (devDependency du dossier desktop).
      - name: Dépendances desktop
        working-directory: desktop
        run: npm install

      # Construit l'app et publie une Release (brouillon) avec tous les binaires.
      - name: Build & Release Tauri
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # --- Signature + notarisation macOS : renseignez les secrets du dépôt
          # --- (Settings → Secrets and variables → Actions) pour éviter Gatekeeper.
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        with:
          projectPath: desktop
          tagName: ${{ github.ref_name }}
          releaseName: "DBDump ${{ github.ref_name }}"
          releaseBody: |
            Téléchargez l'installeur correspondant à votre système ci-dessous.

            **macOS** — l'application est signée avec un certificat Apple Developer et notarisée par Apple : ouvrez le `.dmg` et glissez DBDump dans Applications, elle démarre sans avertissement.

            **Windows** — si SmartScreen affiche « Windows a protégé votre ordinateur », cliquez sur *Informations complémentaires* → *Exécuter quand même*.
          # false = la Release est publiée automatiquement dès que la build réussit
          # (une Release en brouillon n'apparaît pas publiquement et n'est pas
          # renvoyée par l'API /releases/latest → les boutons de téléchargement
          # de la landing retombent sur la page GitHub au lieu du binaire direct).
          releaseDraft: false
          prerelease: false
          args: ${{ matrix.args }}

      # Tauri notarise le bundle .app mais PAS le conteneur .dmg : un .dmg non
      # notarisé déclenche un avertissement Gatekeeper au montage après téléchargement.
      # On le notarise + agrafe ici, puis on remplace l'asset déjà publié sur la Release.
      - name: Notariser le DMG (macOS)
        if: startsWith(matrix.platform, 'macos')
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          if [ -z "${APPLE_ID:-}" ] || [ -z "${APPLE_PASSWORD:-}" ] || [ -z "${APPLE_TEAM_ID:-}" ]; then
            echo "Secrets APPLE_* absents → notarisation du DMG ignorée (le .dmg restera non notarisé)."
            exit 0
          fi
          shopt -s nullglob
          dmgs=(desktop/target/*/release/bundle/dmg/*.dmg)
          if [ ${#dmgs[@]} -eq 0 ]; then
            echo "Aucun DMG produit sur cette cible, rien à notariser."
            exit 0
          fi
          for dmg in "${dmgs[@]}"; do
            echo "== Notarisation de $dmg =="
            xcrun notarytool submit "$dmg" \
              --apple-id "$APPLE_ID" \
              --password "$APPLE_PASSWORD" \
              --team-id "$APPLE_TEAM_ID" \
              --wait
            xcrun stapler staple "$dmg"
            echo "== Remplacement de l'asset notarisé sur la Release $GITHUB_REF_NAME =="
            gh release upload "$GITHUB_REF_NAME" "$dmg" --clobber
          done
