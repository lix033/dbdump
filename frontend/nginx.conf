# Sert la landing statique (export Next.js) sur le port attendu par app.yaml.
server {
    listen 3097;
    listen [::]:3097;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    gzip on;
    gzip_comp_level 5;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml;

    # Health check (app.yaml → healthPath: /).
    location = / {
        try_files /index.html =404;
    }

    # Assets Next.js versionnés : immuables, cache long.
    location /_next/static/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # La route /app est l'UI embarquée par le desktop : pas destinée au public.
    # (Regex précise pour ne bloquer que /app et /app/… , pas /apple.png etc.)
    location ~ ^/app(/|$) {
        return 404;
    }

    # Pages statiques (trailingSlash: true → dossiers avec index.html).
    location / {
        try_files $uri $uri/ $uri.html =404;
    }
}
